name: QA Iterative Loop (QAL)
id: qal-v1
description: "Ciclo de iteração QA -> Dev para correção de bugs e melhorias"

iterations:
  max_attempts: 5
  exit_condition: "qa verdict: PASS"

flow:
  - step: 1-review
    agent: "@qa"
    action: "review-10-phase"
    description: "Execução de review completa de 10 fases"

  - step: 2-feedback
    agent: "@qa"
    action: "create-fix-request"
    description: "Geração de QA_FIX_REQUEST.md se bugs encontrados"
    condition: "bugs found"

  - step: 3-fix
    agent: "@dev"
    action: "apply-qa-fixes"
    description: "Correção de bugs e self-critique da solução"
    condition: "fix request exists"

  - step: 4-verify
    agent: "@dev"
    action: "run-tests"
    description: "Execução de testes unitários e de integração locais"

  - step: 5-repeat
    action: "return to step 1"
    description: "Repetir até PASS ou atingir max_attempts"

critical_actions:
  - If max_attempts reached: "Escalar para @aios-master (Orion)"
  - If QA verdict is PASS: "Mudar status para Ready for Merge"
