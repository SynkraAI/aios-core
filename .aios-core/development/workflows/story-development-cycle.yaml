name: Story Development Cycle (SDC)
id: sdc-v1
description: "Fluxo completo de desenvolvimento God Mode: @sm -> @po -> @dev -> @qa -> @devops"

phases:
  - id: 1-draft
    agent: "@sm"
    command: "*draft"
    description: "Criação do rascunho da story e definição de critérios de aceitação iniciais"
    artifacts: ["docs/stories/story-*.md"]

  - id: 2-validate
    agent: "@po"
    command: "*validate"
    description: "Refinamento e aprovação da story para desenvolvimento"
    requirements: ["phase 1 complete"]

  - id: 3-develop
    agent: "@dev"
    command: "*develop"
    description: "Implementação de código, testes e self-critique"
    mode: "yolo | interactive"
    requirements: ["story status: Ready for Dev"]

  - id: 4-gate
    agent: "@qa"
    command: "*gate"
    description: "Review de 10 fases, auditoria de segurança e veredito de qualidade"
    requirements: ["story status: Ready for Review"]

  - id: 5-push
    agent: "@devops"
    command: "*push"
    description: "Merge, push para remote e fechamento da story"
    requirements: ["qa verdict: PASS"]

rules:
  - "Nenhuma fase pode ser pulada sem autorização do @aios-master"
  - "Falhas na fase 4 (QA) retornam a story para a fase 3 (Dev) com QA_FIX_REQUEST.md"
  - "O self-critique do @dev é obrigatório antes da transição para o @qa"
