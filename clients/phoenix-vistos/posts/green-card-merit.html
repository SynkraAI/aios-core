<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Vistos — Green Card por Mérito</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #07091a;
    }

    .post {
      width: 1080px;
      height: 1350px;
      position: relative;
      font-family: 'Sora', sans-serif;
      overflow: hidden;
      background: #07091a;
    }

    /* === BACKGROUND === */
    .bg-layer {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 85% 15%, rgba(139, 26, 42, 0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 15% 85%, rgba(10, 18, 70, 0.6) 0%, transparent 55%),
        linear-gradient(165deg, #0b1028 0%, #060a1c 60%, #040710 100%);
    }

    /* Subtle texture stars */
    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 12% 18%, rgba(255,255,255,0.18) 0%, transparent 100%),
        radial-gradient(1px 1px at 28% 9%, rgba(255,255,255,0.12) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 48% 6%, rgba(255,255,255,0.10) 0%, transparent 100%),
        radial-gradient(1px 1px at 67% 14%, rgba(255,255,255,0.14) 0%, transparent 100%),
        radial-gradient(1px 1px at 83% 8%, rgba(255,255,255,0.10) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 92% 22%, rgba(255,255,255,0.12) 0%, transparent 100%),
        radial-gradient(1px 1px at 18% 32%, rgba(255,255,255,0.08) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 26%, rgba(255,255,255,0.09) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 74% 35%, rgba(255,255,255,0.11) 0%, transparent 100%);
    }

    /* Diamond watermark — right side */
    .diamond-bg {
      position: absolute;
      right: -120px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.035;
      pointer-events: none;
    }

    /* === TOP ACCENT === */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #8B1A2A 0%, #C9A065 45%, rgba(201,160,101,0.0) 100%);
    }

    /* === MAIN CONTENT === */
    .content {
      position: absolute;
      top: 50%;
      transform: translateY(-54%);
      left: 84px;
      right: 84px;
    }

    /* Eyebrow tag */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 48px;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8B1A2A;
      flex-shrink: 0;
    }

    .eyebrow-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
    }

    /* Headlines */
    .h1 {
      font-size: 70px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.06;
      margin-bottom: 6px;
    }

    .h2 {
      font-size: 70px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.06;
      margin-bottom: 64px;
    }

    .highlight-crimson {
      background-color: #8B1A2A;
      padding: 2px 18px 8px;
      display: inline;
      line-height: 1.2;
    }

    /* Divider */
    .divider {
      width: 68px;
      height: 4px;
      background: #8B1A2A;
      margin-bottom: 52px;
      border-radius: 2px;
    }

    /* Body copy */
    .body {
      font-size: 37px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.68);
      line-height: 1.58;
    }

    .body-em {
      font-size: 37px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.90);
      line-height: 1.58;
    }

    .gold {
      color: #C9A065;
      font-weight: 700;
    }

    /* === BOTTOM LOGO === */
    .logo-row {
      position: absolute;
      bottom: 76px;
      left: 84px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-wordmark {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo-name {
      font-family: 'Sora', sans-serif;
      font-size: 34px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.5px;
      line-height: 1;
    }

    .logo-tagline {
      font-size: 9.5px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.50);
      letter-spacing: 3.8px;
      margin-top: 5px;
      text-transform: uppercase;
    }

    /* Bottom accent */
    .bottom-line {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #8B1A2A, rgba(139,26,42,0));
    }
  </style>
</head>
<body>
  <div class="post">

    <!-- Background layers -->
    <div class="bg-layer"></div>
    <div class="stars"></div>

    <!-- Top accent bar -->
    <div class="top-bar"></div>

    <!-- Diamond watermark -->
    <svg class="diamond-bg" width="780" height="780" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M100,4 L131,69 L196,100 L131,131 L100,196 L69,131 L4,100 L69,69 Z"
            stroke="white" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M100,24 L122,72 L164,100 L122,128 L100,176 L78,128 L36,100 L78,72 Z"
            stroke="white" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M100,50 L114,80 L140,100 L114,120 L100,150 L86,120 L60,100 L86,80 Z"
            stroke="white" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M100,78 L108,90 L120,100 L108,110 L100,122 L92,110 L80,100 L92,90 Z"
            fill="white"/>
    </svg>

    <!-- MAIN CONTENT -->
    <div class="content">

      <div class="eyebrow">
        <div class="eyebrow-dot"></div>
        <div class="eyebrow-text">Green Card por Mérito</div>
      </div>

      <div class="h1">O cenário pode mudar.</div>
      <div class="h2">O nível de exigência,&nbsp;<span class="highlight-crimson">não.</span></div>

      <div class="divider"></div>

      <div class="body">Em processos de <span class="gold">Green Card por mérito,</span></div>
      <div class="body">o que sustenta a narrativa</div>
      <div class="body-em">são <span class="highlight-crimson" style="padding: 4px 18px 9px;">evidências.</span></div>

    </div>

    <!-- LOGO -->
    <div class="logo-row">
      <!-- Diamond mark -->
      <svg width="52" height="52" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M100,4 L131,69 L196,100 L131,131 L100,196 L69,131 L4,100 L69,69 Z"
              stroke="white" stroke-width="11" stroke-linejoin="round"/>
        <path d="M100,28 L118,72 L160,100 L118,128 L100,172 L82,128 L40,100 L82,72 Z"
              stroke="white" stroke-width="9" stroke-linejoin="round"/>
        <path d="M100,56 L112,80 L136,100 L112,120 L100,144 L88,120 L64,100 L88,80 Z"
              stroke="white" stroke-width="7" stroke-linejoin="round"/>
        <path d="M100,82 L108,91 L117,100 L108,109 L100,118 L92,109 L83,100 L92,91 Z"
              fill="white"/>
      </svg>

      <div class="logo-wordmark">
        <div class="logo-name">Phoenix</div>
        <div class="logo-tagline">Mentoria em Imigração Qualificada</div>
      </div>
    </div>

    <!-- Bottom accent -->
    <div class="bottom-line"></div>

  </div>
</body>
</html>
