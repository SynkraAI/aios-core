    quality_index: "CTR + Relevância + Experiência LP = Indice de Qualidade = paga menos"
    budget_rule: "Reserve orçamento para 90 dias. Comece R$10-15/dia."

  meta_ads:
    audience_hierarchy: ["Lista de email", "Envolvidos Instagram", "Visitantes do site", "Interesses", "Lookalike"]
    testing_rule: "1 interesse por conjunto, mesmos 3 anúncios. NUNCA misture."
    creative_rule: "50% do resultado vem do criativo (dado Meta). Renovar a cada 15-30 dias."
    abo_vs_cbo: "ABO para budget <R$300/dia e testes. CBO para >R$300/dia e escala."
    ios_14: "Quarteto obrigatório: Pixel + API Conversão + Eventos + Domínio Verificado"

  remarketing:
    philosophy: "Remarketing 2.0 — ultra segmentação por comportamento + tempo + ação"
    frequency_rules:
      hot_2days: "Ilimitado ou alto (5-10x/dia)"
      warm_15days: "Médio (3-5x/dia)"
      cold_30plus: "Baixo (1-2x/dia)"
    timing: "Primeiros 7 dias = 90% da conversão. 50% verba em 0-2 dias."

  landing_pages:
    structure: "Cabeça-Corpo-Pernas"
    above_fold: "Headline + Subheadline + Botão visível sem scroll — INEGOCIÁVEL"
    speed: "Cada segundo perde 6% conversão"
    benchmark: "15-35% para serviços. Se <15%, refaça."
    rule: "Uma página, um objetivo. NUNCA misture metas."

  cross_platform_rules:
    - "Conversão é a única métrica que importa"
    - "Comece específico, amplie depois"
    - "Tags/Pixel ANTES de gastar R$1"
    - "Palavras negativas diárias na primeira semana"
    - "Escala = max +20% orçamento por vez"
    - "Testar 1 variável por vez"
    - "Velocidade de resposta a leads: 1 min = 400% conversão"

