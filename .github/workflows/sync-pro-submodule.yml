name: Sync Pro Submodule Fallback

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'Optional aios-pro commit SHA to sync into the pro submodule'
        required: false
        type: string
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Reconcile pro submodule drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRO_REPO_URL: https://github.com/SynkraAI/aios-pro.git
      SYNC_BRANCH: bot/sync-pro-submodule
    steps:
      - name: Checkout aiox-core with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure git identity
        run: |
          git config user.name "aiox-sync-bot"
          git config user.email "actions@github.com"

      - name: Resolve upstream target
        id: resolve
        env:
          INPUT_SHA: ${{ github.event.inputs.target_sha }}
          PRO_REPO_URL: ${{ env.PRO_REPO_URL }}
        run: |
          TARGET_SHA="$INPUT_SHA"
          if [ -z "$TARGET_SHA" ]; then
            TARGET_SHA=$(git ls-remote "$PRO_REPO_URL" refs/heads/main | awk '{print $1}')
          fi

          CURRENT_SHA=$(git -C pro rev-parse HEAD)

          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=${TARGET_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_SHA" = "$TARGET_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update pro submodule pointer
        if: steps.resolve.outputs.changed == 'true'
        env:
          TARGET_SHA: ${{ steps.resolve.outputs.target_sha }}
        run: |
          git -C pro fetch origin main
          if ! git -C pro cat-file -e "$TARGET_SHA^{commit}" 2>/dev/null; then
            git -C pro fetch origin "$TARGET_SHA"
          fi
          git -C pro checkout "$TARGET_SHA"
          git add pro

      - name: Commit sync branch
        if: steps.resolve.outputs.changed == 'true'
        env:
          SHORT_SHA: ${{ steps.resolve.outputs.short_sha }}
          SYNC_BRANCH: ${{ env.SYNC_BRANCH }}
        run: |
          git checkout -B "$SYNC_BRANCH"
          git commit -m "chore: sync pro submodule to $SHORT_SHA"
          git push --force-with-lease origin "$SYNC_BRANCH"

      - name: Create or update PR
        if: steps.resolve.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SHORT_SHA: ${{ steps.resolve.outputs.short_sha }}
          TARGET_SHA: ${{ steps.resolve.outputs.target_sha }}
          CURRENT_SHA: ${{ steps.resolve.outputs.current_sha }}
          SYNC_BRANCH: ${{ env.SYNC_BRANCH }}
        run: |
          PR_URL=$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --head "$SYNC_BRANCH" \
            --base main \
            --state open \
            --json url \
            --jq '.[0].url')

          BODY=$(cat <<EOF
          ## Automated pro sync fallback

          - Previous SHA: \`$CURRENT_SHA\`
          - Target SHA: \`$TARGET_SHA\`
          - Trigger: \`${GITHUB_WORKFLOW}\`

          This PR reconciles the \`pro\` submodule with the latest upstream state from \`SynkraAI/aios-pro\`.
          EOF
          )

          if [ -n "$PR_URL" ]; then
            gh pr edit "$PR_URL" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "chore: sync pro submodule ($SHORT_SHA)" \
              --body "$BODY"
            echo "Updated existing PR: $PR_URL"
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "$SYNC_BRANCH" \
              --title "chore: sync pro submodule ($SHORT_SHA)" \
              --body "$BODY"
          fi
