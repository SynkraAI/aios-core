<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Cinzel:wght@400;600;700&family=Alegreya:wght@400;500;700&family=Orbitron:wght@400;500;700&family=Share+Tech+Mono&family=Audiowide&family=Exo+2:wght@400;500;600;700&family=Michroma&family=Monoton&family=VT323&family=Karla:wght@400;500;700&family=Fira+Code:wght@400;500;600&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #080810;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 2rem;
      min-height: 100vh;
    }

    .page-header {
      text-align: center;
      padding: 2rem 0 2.5rem;
    }
    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .page-header p {
      color: #64748b;
      font-size: 0.85rem;
    }
    .page-header .count {
      display: inline-block;
      margin-top: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      background: rgba(99,102,241,0.15);
      color: #818cf8;
      border: 1px solid rgba(99,102,241,0.3);
    }

    /* Grid */
    .themes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 1.5rem;
      max-width: 1800px;
      margin: 0 auto;
    }

    /* Theme card */
    .theme-card {
      border-radius: var(--tc-radius, 12px);
      background: var(--tc-bg-primary);
      border: 1px solid var(--tc-border);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }
    .theme-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }

    /* Card header */
    .tc-header {
      padding: 1rem 1.25rem;
      background: var(--tc-bg-card);
      border-bottom: 1px solid var(--tc-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tc-name {
      font-family: var(--tc-font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--tc-text-accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .tc-id {
      font-family: var(--tc-font-mono);
      font-size: 0.6rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      border: 1px solid var(--tc-border);
      color: var(--tc-text-secondary);
      letter-spacing: 1px;
    }

    /* Card body */
    .tc-body {
      padding: 1.25rem;
      display: grid;
      gap: 0.9rem;
    }

    /* Description */
    .tc-desc {
      font-size: 0.75rem;
      color: var(--tc-text-secondary);
      font-style: italic;
      line-height: 1.5;
    }

    /* Stats row */
    .tc-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }
    .tc-stat {
      text-align: center;
      padding: 0.6rem 0.4rem;
      background: var(--tc-bg-card);
      border-radius: calc(var(--tc-radius, 12px) * 0.6);
      border: 1px solid var(--tc-border);
    }
    .tc-stat-value {
      font-family: var(--tc-font-mono);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--tc-text-accent);
      line-height: 1.2;
    }
    .tc-stat-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--tc-text-secondary);
      margin-top: 0.15rem;
    }

    /* Level section */
    .tc-level {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .tc-level-badge {
      font-family: var(--tc-font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      background: var(--tc-accent-primary);
      color: var(--tc-bg-primary);
      white-space: nowrap;
    }
    .tc-xp-bar {
      flex: 1;
      height: 8px;
      background: var(--tc-bg-card);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--tc-border);
    }
    .tc-xp-fill {
      height: 100%;
      width: 68%;
      border-radius: 999px;
      background: var(--tc-progress);
    }

    /* Worlds */
    .tc-worlds {
      display: grid;
      gap: 0.35rem;
    }
    .tc-world {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 0.7rem;
      border-radius: calc(var(--tc-radius, 12px) * 0.5);
      background: var(--tc-bg-card);
      border-left: 3px solid var(--tc-border);
      font-size: 0.75rem;
      color: var(--tc-text-primary);
    }
    .tc-world.complete { border-left-color: #22c55e; opacity: 0.7; }
    .tc-world.active { border-left-color: var(--tc-accent-primary); }
    .tc-world.locked { border-left-color: var(--tc-border); opacity: 0.3; }

    /* Light theme card adjustments */
    .theme-card[data-light="true"] .tc-ach {
      background: var(--tc-bg-primary);
    }
    .theme-card[data-light="true"] .tc-xp-bar {
      background: var(--tc-bg-primary);
    }
    .theme-card[data-light="true"] .tc-world-bar {
      background: var(--tc-border);
    }

    /* Section divider */
    .section-divider {
      text-align: center;
      padding: 3rem 0 2rem;
      position: relative;
    }
    .section-divider::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: #1e293b;
    }
    .section-divider span {
      position: relative;
      background: #080810;
      padding: 0 1.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #64748b;
    }
    .tc-world-name {
      flex: 1;
      font-family: var(--tc-font-display);
      font-size: 0.7rem;
    }
    .tc-world-progress {
      font-family: var(--tc-font-mono);
      font-size: 0.6rem;
      color: var(--tc-text-secondary);
    }
    .tc-world-bar {
      width: 60px;
      height: 4px;
      background: var(--tc-bg-primary);
      border-radius: 999px;
      overflow: hidden;
    }
    .tc-world-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--tc-progress);
    }

    /* Achievements */
    .tc-achievements {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .tc-ach {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      background: var(--tc-bg-card);
      border: 1px solid var(--tc-accent-primary);
    }
    .tc-ach.locked {
      opacity: 0.15;
      border-color: var(--tc-border);
      filter: grayscale(1);
    }

    /* Color swatches */
    .tc-swatches {
      display: flex;
      gap: 4px;
      padding-top: 0.6rem;
      border-top: 1px solid var(--tc-border);
    }
    .tc-swatch {
      flex: 1;
      height: 8px;
      border-radius: 4px;
      position: relative;
      cursor: default;
    }
    .tc-swatch::after {
      content: attr(data-hex);
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      color: var(--tc-text-secondary);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .theme-card:hover .tc-swatch::after { opacity: 1; }

    /* Footer */
    .tc-footer {
      padding: 0.5rem 1.25rem;
      background: var(--tc-bg-card);
      border-top: 1px solid var(--tc-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.6rem;
      color: var(--tc-text-secondary);
    }
    .tc-footer-font {
      font-family: var(--tc-font-display);
      color: var(--tc-text-accent);
      font-size: 0.65rem;
    }
    .tc-footer-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      opacity: 0.6;
    }

    /* Responsive */
    @media (max-width: 860px) {
      .themes-grid { grid-template-columns: 1fr; }
      body { padding: 1rem; }
    }
    @media (min-width: 1800px) {
      .themes-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>

          '<div class="tc-ach">\u2694\uFE0F</div>' +
          '<div class="tc-ach">\uD83C\uDFE0</div>' +
          '<div class="tc-ach">\uD83E\uDDE0</div>' +
          '<div class="tc-ach">\uD83D\uDD28</div>' +
          '<div class="tc-ach locked">\uD83D\uDC8E</div>' +
          '<div class="tc-ach locked">\uD83D\uDE80</div>' +
        '</div>' +
        '<div class="tc-swatches">' + swatchesHtml + '</div>' +
      '</div>' +
      '<div class="tc-footer">' +
        '<span class="tc-footer-font">' + fontName + '</span>' +
        '<span class="tc-footer-id">theme: ' + t.id + '</span>' +
      '</div>' +
    '</div>';
  }

  function render() {
    var app = document.getElementById('app');
    var darkThemes = THEMES.filter(function(t) { return !t.light; });
    var lightThemes = THEMES.filter(function(t) { return t.light; });

    var html = '<div class="section-divider"><span>Dark Mode \u2014 ' + darkThemes.length + ' temas</span></div>';
    html += '<div class="themes-grid">';
    for (var i = 0; i < darkThemes.length; i++) {
      html += renderCard(darkThemes[i]);
    }
    html += '</div>';

    html += '<div class="section-divider"><span>Light Mode \u2014 ' + lightThemes.length + ' temas</span></div>';
    html += '<div class="themes-grid">';
    for (var j = 0; j < lightThemes.length; j++) {
      html += renderCard(lightThemes[j]);
    }
    html += '</div>';

    app.innerHTML = html;
    document.getElementById('count').textContent = THEMES.length + ' temas disponíveis (' + darkThemes.length + ' dark + ' + lightThemes.length + ' light)';
  }

  render();
  </script>
</body>
</html>
