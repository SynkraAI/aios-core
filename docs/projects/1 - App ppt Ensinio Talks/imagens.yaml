items:
  # ========================= DIAGRAMAS (12) =========================
  - id: d1
    filename: 01-executor-orquestrador.png
    category: diagrama
    aspect_ratio: '16:9'
    prompt: |
      STYLE ANCHOR: Editorial infographic on dark background #0a0a0a, amber #f59e0b accents,
      thin white lines, Inter/Montserrat sans-serif typography, negative space, high contrast,
      minimalist, no clutter, 16:9 aspect ratio. ALL TEXT IN BRAZILIAN PORTUGUESE with correct
      accents (acentuação, cedilhas, tildes). Do NOT translate to English. Proper names stay as-is.

      Minimalist editorial infographic. LEFT side: a lone figure with text label above reading
      "EXECUTOR", typing on a single computer, isolated. RIGHT side: the same figure elevated
      on a podium with text label above reading "ORQUESTRADOR", conducting 5 glowing nodes with
      Portuguese labels "IA", "DESIGN", "CÓDIGO", "DADOS", "TESTES", connected by thin amber
      lines forming a network. Big bold Portuguese title on top:
      "CÓDIGO É COMMODITY. ORQUESTRAR É A NOVA HABILIDADE."

  - id: d2
    filename: 02-vibe-coding-vs-sdd.png
    category: diagrama
    aspect_ratio: '16:9'
    prompt: |
      STYLE ANCHOR: dark bg #0a0a0a, amber #f59e0b, thin white lines, Inter/Montserrat,
      pt-BR text with accents, 16:9.

      Split-screen comparison. LEFT column (red tinted) with Portuguese label 'VIBE CODING':
      chaotic zigzag path with loops, question marks, figure scratching head, tangled wires,
      tag 'RÁPIDO, MAS FRÁGIL'. RIGHT column (amber tinted) with label 'SPEC-DRIVEN DEVELOPMENT
      (SDD)': clean linear flow with 4 boxes 'SPEC → PLANO → BUILD → ENTREGA', amber arrows,
      blueprint icon, tag 'COMEÇO LENTO, ESCALA RÁPIDA'. Title: 'OS DOIS JEITOS DE CONSTRUIR COM IA'.

  - id: d3
    filename: 03-janela-contexto.png
    category: diagrama
    aspect_ratio: '16:9'
    prompt: |
      STYLE ANCHOR: dark #0a0a0a, amber #f59e0b accents, pt-BR text with accents, 16:9,
      isometric editorial.

      Isometric illustration. Glowing work desk labeled 'JANELA DE CONTEXTO' with papers,
      files, holographic code snippets piled. Capacity bar above shows '87% CHEIA' in amber.
      LEFT: figure labeled 'VOCÊ' holds a broom labeled 'CLAUDE.MD + MEMORY.MD', sweeping
      papers into archive folder labeled 'MEMÓRIA PERSISTENTE'. RIGHT: another desk overflowing,
      papers falling, label 'SEM GERENCIAMENTO — AS COISAS SE PERDEM'.
      Title on top: 'VOCÊ É O GERENTE DA SUA JANELA DE CONTEXTO'. Inter/Montserrat typography.

  - id: d4
    filename: 04-entp-vs-istj.png
    category: diagrama
    aspect_ratio: '16:9'
    prompt: |
      STYLE ANCHOR: dark #0a0a0a, amber #f59e0b, pt-BR with accents, 16:9.

      Split comparison. Center: glowing AI core labeled 'CLAUDE CODE'. Two arms extending L/R.
      LEFT skin 'USUÁRIO ENTP (Fosc)': playful colorful speech bubble, emojis, metaphors icons,
      lightbulb for contextual tips, informal vibe. Caption: 'Quer metáforas, humor, tangentes,
      visão ampla.' RIGHT skin 'USUÁRIO ISTJ': clean structured bubble, bullets, checklists,
      no emojis, formal. Caption: 'Quer respostas diretas, estrutura, sem firula, passos
      comprovados.' Between: box 'Squad de MBTI analisou cada usuário e customizou o CLAUDE.MD
      para cada um.' Title: 'UMA IA. DUAS PERSONALIDADES. AMBAS CERTAS.'

  - id: d5
    filename: 05-fonte-de-verdade.png
    category: diagrama
    aspect_ratio: '16:9'
    prompt: |
      STYLE ANCHOR: dark #0a0a0a, amber #f59e0b, pt-BR with accents, 16:9,
      minimalist network diagram.

      Center: glowing amber cube labeled 'FONTE DE VERDADE' with sub-labels 'DESIGN SYSTEM',
      'DOCS DA API', 'REGRAS DE NEGÓCIO'. Around it, 6 satellite nodes in a circle: 'FRONTEND',
      'BACKEND', 'MOBILE', 'TESTES', 'DOCS', 'AGENTES DE IA'. Thin amber lines connect
      satellites to center cube only (not to each other). Small box bottom-right: tangled mess
      labeled 'SEM FONTE DE VERDADE' with chaotic connections.
      Title: 'UMA VERDADE, MUITOS CONSUMIDORES'.

  - id: d6
    filename: 06-piramide-hierarquia.png
    category: diagrama
    aspect_ratio: '16:9'
    prompt: |
      STYLE ANCHOR: dark #0a0a0a, amber #f59e0b, pt-BR with accents, 16:9.

      Editorial pyramid diagram. 4-tier pyramid with glowing amber borders, front angle.
      From top to bottom: TIER 1 (top, largest): 'SQUADS — times especializados', icon of
      multiple people. TIER 2: 'AGENTES — especialistas individuais', single person icon.
      TIER 3: 'SKILLS — habilidades', lightbulb icon. TIER 4 (bottom): 'TOOLS — ferramentas',
      wrench icon. Right side caption: 'Ter a skill certa e a tool certa é INÚTIL se você
      pede pra pessoa errada fazer.' Clean infographic.

  - id: d7
    filename: 07-anatomia-mind.png
    category: diagrama
    aspect_ratio: '16:9'
    prompt: |
      STYLE ANCHOR: dark #0a0a0a, amber #f59e0b, pt-BR with accents, 16:9, anatomical style.

      Center: glowing silhouette of a human head in profile, brain visible with circuit
      patterns inside. Four lines extend from brain outward to labeled cards: 'VOICE DNA —
      como falam' (waveform icon), 'THINKING DNA — como raciocinam' (neural network icon),
      'FRAMEWORKS MENTAIS — seus modelos' (grid icon), 'ANTI-PADRÕES — o que evitam'
      (forbidden icon). Big title: 'UM MIND NÃO É UMA PERSONA. É UM CLONE.'
      Subtitle: 'Não peça pra IA AGIR como o Einstein. Faça ela SER o Einstein.'

  - id: d8
    filename: 08-advisor-board.png
    category: diagrama
    aspect_ratio: '16:9'
    prompt: |
      STYLE ANCHOR: dark #0a0a0a, amber #f59e0b, pt-BR with accents (proper names stay as-is),
      16:9, cinematic editorial.

      Top-down view of a round glass table with amber glow, board room. Around the table:
      5 holographic figures debating. Name plates: STEVE JOBS (black turtleneck silhouette,
      Apple icon), BILL GATES (glasses silhouette, Microsoft icon), ELON MUSK (rocket icon
      silhouette), WALT DISNEY (vintage hat silhouette, castle icon), and a chair at the head
      labeled 'VOCÊ' (normal person). Speech bubbles with Portuguese phrases: 'Está SIMPLES
      o suficiente?', 'Qual o impacto SISTÊMICO?', 'PRIMEIROS PRINCÍPIOS?',
      'Onde está a HISTÓRIA?'. Center of table: glowing 'DECISÃO ESTRATÉGICA'.
      Footer: 'Trabalho extenso UMA VEZ. Seu PARA SEMPRE.'
      Title: 'SEU CONSELHO PESSOAL DE LENDAS'.

  - id: d9
    filename: 09-fluxo-ideia-produto.png
    category: diagrama
    aspect_ratio: '16:9'
    prompt: |
      STYLE ANCHOR: dark #0a0a0a, amber #f59e0b, pt-BR with accents, 16:9, horizontal flowchart.

      5 stages arranged left to right, each in a rounded rectangle card, numbered 1-5:
      1. 'IDEIA' lightbulb icon, small, gray. 2. 'PRD' document icon, LARGE card (40% visual
      weight), label '/prd-generator — 80% do seu tempo vive aqui'. 3. 'SPEC' blueprint icon,
      medium, label '/tech-research — não reinvente a roda'. 4. 'EPICS + STORIES' kanban icon,
      medium, label '/forge + /quest — execução gamificada'. 5. 'APP ENTREGUE' rocket icon,
      green glow, label 'Qualidade premium + documentado + expansível'. Between stages 1 and 2,
      big curved label: 'A REGRA 80/20 — a maioria pula essa etapa e fracassa'. Bottom: thin
      timeline '80% no PRD' e '20% no resto'.
      Title: 'DA IDEIA AO PRODUTO — O FLUXO SDD'. Slash commands like /prd-generator stay as-is.

  - id: d10
    filename: 10-loop-ping-pong.png
    category: diagrama
    aspect_ratio: '16:9'
    prompt: |
      STYLE ANCHOR: dark #0a0a0a, amber #f59e0b, pt-BR with accents (product names stay
      English), 16:9.

      Circular loop. Two character avatars facing. LEFT: 'CLAUDE CODE' with Portuguese
      subtitle 'O gênio criativo bêbado', holding paintbrush and broken calculator, halo of
      lightbulbs, tilted pose, warm amber glow. RIGHT: 'CODEX' with subtitle 'O auditor sóbrio
      e autista', glasses, magnifying glass, red pen, upright posture, cool white glow.
      Between: circular arrows. Top arrow L→R: 'CONSTRÓI A FEATURE'. Bottom arrow R→L:
      'DEVOLVE REVIEW + FIXES NECESSÁRIOS'. Center scoreboard:
      'RODADA 1: 6/10 → RODADA 2: 8/10 → RODADA 3: 10/10' + trophy.
      Title: 'A DUPLA DE LLMs — CRIATIVIDADE ENCONTRA DISCIPLINA'.

  - id: d11
    filename: 11-timeline-forge.png
    category: diagrama
    aspect_ratio: '16:9'
    prompt: |
      STYLE ANCHOR: dark #0a0a0a, amber #f59e0b, pt-BR with accents (AIOX/QUEST/FORGE stay
      as-is), 16:9.

      Horizontal timeline. 4 milestones on thin white line: 1. 'AIOX' description 'Poderoso
      mas implacável. Você delega tudo. Se deixar algo passar, ele não avisa.' Icon: complex
      gear. Gray. 2. 'QUEST (nascido como dashboard)' description 'Só queria acompanhar o
      progresso visualmente.' Icon: simple minimap. Light amber. 3. 'QUEST (evoluiu pra jogo)'
      description 'O dashboard virou um sistema de níveis. A coisa ficou interessante.' Icon:
      game controller with XP bar. Amber. 4. 'FORGE' description 'A sacada: se o Quest é o
      jogo, precisamos de um motor melhor. Nasceu o Forge.' Icon: glowing forge/anvil, sparks.
      Bright amber. Between 3 and 4: big speech bubble 'MOMENTO EUREKA'.
      Title: 'COMO UM DASHBOARD VIROU UM FRAMEWORK'.

  - id: d12
    filename: 12-receita-forge.png
    category: diagrama
    aspect_ratio: '16:9'
    prompt: |
      STYLE ANCHOR: dark #0a0a0a, amber #f59e0b, pt-BR with accents (product names stay
      as-is), 16:9, cinematic editorial.

      Central: large glowing amber forge/anvil with molten metal inside. TOP ROW labeled
      '8 FRAMEWORKS ABSORVIDOS': 8 pills raining as amber streams into forge — 'RALPH', 'BMAD',
      'AIOX', 'OPENSQUAD', 'XOIA', 'GSD-2', '/forge', '/quest'. MIDDLE ROW '3 SKILLS LOCAIS':
      3 pills falling — 'STRESS-TEST', 'PING-PONG', 'CELF'. BOTTOM HALO rising UP as sparks
      '10 INOVAÇÕES EXCLUSIVAS': 10 glowing stars labeled 'CONTEXTSTATE UNIFICADO', 'MVP GATE',
      'FORGE MEMORY', 'PRD-GENERATOR', 'SCOPE LOCK', 'STATE = FONTE DE VERDADE',
      'ANALYSIS GUARD', 'DEVIATION CONTRACT', 'QUEST NATIVO', 'DRY RUN + REPLAY'.
      Below: glowing amber ingot with tagline
      'FORGE — DA IDEIA AO DEPLOY. SEM ATALHO RASO. COM XP.'
      Title: 'A RECEITA: 8 + 3 + 10'.

