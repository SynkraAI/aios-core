<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ensinio Talks — Fosc IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== TOKENS ===== */
:root {
  --amber: #f59e0b;
  --amber-soft: #fbbf24;
  --amber-deep: #d97706;
  --font-head: 'Montserrat', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 22px;
  --shadow: 0 20px 60px rgba(0,0,0,0.35);
  --transition: 220ms cubic-bezier(.4,0,.2,1);
}

[data-theme="dark"] {
  --bg: #0a0a0a;
  --bg-2: #111113;
  --bg-3: #17171a;
  --fg: #f5f5f5;
  --fg-muted: #a3a3a3;
  --fg-dim: #525252;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.18);
  --surface: rgba(255,255,255,0.03);
  --surface-2: rgba(255,255,255,0.06);
  --overlay: rgba(0,0,0,0.75);
  --code-bg: #0d0d10;
}

[data-theme="light"] {
  --bg: #fafaf9;
  --bg-2: #f5f5f4;
  --bg-3: #eceae6;
  --fg: #0a0a0a;
  --fg-muted: #525252;
  --fg-dim: #a3a3a3;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.2);
  --surface: rgba(0,0,0,0.03);
  --surface-2: rgba(0,0,0,0.06);
  --overlay: rgba(255,255,255,0.85);
  --code-bg: #1a1a1c;
}

/* ===== BASE ===== */
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-body);
  font-size: 17px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  transition: background var(--transition), color var(--transition);
  overflow: hidden;
  height: 100vh;
}
h1, h2, h3, h4 { font-family: var(--font-head); font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; margin: 0; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: var(--amber); text-decoration: none; }
a:hover { text-decoration: underline; }
code, pre { font-family: var(--font-mono); }

/* ===== PROGRESS BAR ===== */
.progress {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--bg-3);
  z-index: 100;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber) 0%, var(--amber-soft) 100%);
  transition: width 400ms cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 20px rgba(245,158,11,0.5);
}

/* ===== LAYOUT ===== */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: 100vh;
  padding-top: 4px;
}

/* ===== SIDEBAR ===== */
.sidebar {
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 28px 0 28px 0;
  transition: transform var(--transition);
  display: flex;
  flex-direction: column;
}
.sidebar nav { flex: 1; }
.sidebar-footer {
  margin-top: 20px;
  padding: 20px 24px 8px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 8px;
}
.sidebar-footer-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--fg-dim);
}
.sidebar-footer img {
  max-width: 140px;
  height: auto;
  opacity: 0.85;
  transition: opacity var(--transition), filter var(--transition);
}
.sidebar-footer img:hover { opacity: 1; }
[data-theme="light"] .sidebar-footer img {
  filter: invert(1) brightness(0.2);
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

.sidebar-header {
  padding: 0 24px 20px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.sidebar-title {
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--fg-muted);
  margin-bottom: 6px;
}
.sidebar-subtitle {
  font-family: var(--font-head);
  font-size: 18px;
  font-weight: 800;
  color: var(--fg);
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--amber);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 10px;
}
.sidebar-brand::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--amber);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--amber);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.sidebar-act {
  padding: 14px 24px 6px 24px;
  font-family: var(--font-head);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--amber);
}
.sidebar-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 9px 24px 9px 40px;
  font-size: 13px;
  color: var(--fg-muted);
  border-left: 2px solid transparent;
  transition: all var(--transition);
  position: relative;
}
.sidebar-item:hover {
  background: var(--surface);
  color: var(--fg);
}
.sidebar-item.active {
  color: var(--fg);
  background: var(--surface-2);
  border-left-color: var(--amber);
  font-weight: 500;
}
.sidebar-item .num {
  display: inline-block;
  width: 32px;
  color: var(--fg-dim);
  font-family: var(--font-mono);
  font-size: 11px;
}
.sidebar-item.active .num { color: var(--amber); }

/* ===== MAIN ===== */
.main {
  position: relative;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
}
.main::-webkit-scrollbar { width: 8px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

.slide {
  min-height: calc(100vh - 4px);
  padding: 80px 80px 120px 80px;
  display: flex;
  flex-direction: column;
  position: relative;
  animation: fadeIn 400ms ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Act backgrounds */
.slide[data-act="1"] { background: radial-gradient(ellipse at top left, rgba(245,158,11,0.06) 0%, transparent 50%), var(--bg); }
.slide[data-act="2"] { background: radial-gradient(ellipse at top right, rgba(139,92,246,0.05) 0%, transparent 50%), var(--bg); }
.slide[data-act="3"] { background: radial-gradient(ellipse at bottom left, rgba(59,130,246,0.05) 0%, transparent 50%), var(--bg); }
.slide[data-act="4"] { background: radial-gradient(ellipse at top, rgba(236,72,153,0.05) 0%, transparent 50%), var(--bg); }
.slide[data-act="5"] { background: radial-gradient(ellipse at bottom right, rgba(34,197,94,0.05) 0%, transparent 50%), var(--bg); }
.slide[data-act="6"] { background: radial-gradient(ellipse at center, rgba(234,88,12,0.05) 0%, transparent 60%), var(--bg); }
.slide[data-act="7"] { background: radial-gradient(ellipse at top, rgba(245,158,11,0.10) 0%, transparent 55%), var(--bg); }
.slide[data-act="8"] { background: radial-gradient(ellipse at bottom, rgba(168,85,247,0.06) 0%, transparent 50%), var(--bg); }

/* ===== COVER ===== */
.cover {
  min-height: calc(100vh - 4px);
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at 30% 30%, rgba(245,158,11,0.12) 0%, transparent 60%),
              radial-gradient(circle at 70% 70%, rgba(245,158,11,0.08) 0%, transparent 60%),
              var(--bg);
  padding: 80px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.cover::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(circle at center, black 20%, transparent 70%);
  opacity: 0.4;
}
.cover-content {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  display: grid;
  grid-template-columns: minmax(320px, 480px) 1fr;
  gap: 64px;
  align-items: center;
  text-align: left;
}
.cover-poster {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  aspect-ratio: 1/1;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px var(--border-strong);
  background: var(--bg-2);
}
.cover-poster img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.cover-poster::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-lg);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  pointer-events: none;
}
.cover-text { min-width: 0; }
.cover-kicker {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 8px 18px;
  background: var(--surface-2);
  border: 1px solid var(--border-strong);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 32px;
}
.cover-kicker::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--amber);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--amber);
}
.cover-title {
  font-size: clamp(40px, 5.2vw, 80px);
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 0.95;
  margin-bottom: 24px;
  background: linear-gradient(180deg, var(--fg) 0%, var(--fg-muted) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.cover-title .amber {
  background: linear-gradient(180deg, var(--amber-soft) 0%, var(--amber-deep) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.cover-subtitle {
  font-size: clamp(17px, 1.4vw, 20px);
  color: var(--fg-muted);
  font-weight: 400;
  max-width: 560px;
  margin: 0 0 40px 0;
  line-height: 1.55;
}
.cover-meta {
  display: flex;
  gap: 32px;
  justify-content: flex-start;
  flex-wrap: wrap;
  margin-top: 32px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
}
.cover-meta-item {
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-muted);
}
.cover-meta-item strong {
  display: block;
  font-family: var(--font-head);
  color: var(--fg);
  font-size: 14px;
  margin-top: 4px;
  letter-spacing: 0;
  text-transform: none;
}
.cover-hint {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: var(--fg-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  animation: bob 2s ease-in-out infinite;
}
@keyframes bob { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(4px)} }

/* ===== ACT DIVIDER ===== */
.divider {
  min-height: calc(100vh - 4px);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px;
  position: relative;
  overflow: hidden;
}
.divider::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 50%, rgba(245,158,11,0.15) 0%, transparent 50%);
}
.divider-content { position: relative; z-index: 1; }
.divider-label {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--amber);
  letter-spacing: 0.35em;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.divider-number {
  font-family: var(--font-head);
  font-size: clamp(120px, 20vw, 260px);
  font-weight: 900;
  line-height: 0.85;
  letter-spacing: -0.05em;
  background: linear-gradient(180deg, var(--amber-soft) 0%, var(--amber-deep) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 20px;
}
.divider-title {
  font-size: clamp(32px, 4vw, 56px);
  font-weight: 800;
  color: var(--fg);
  max-width: 900px;
}
.divider-line {
  width: 80px;
  height: 2px;
  background: var(--amber);
  margin: 40px auto 0 auto;
  border-radius: 1px;
}

/* ===== SLIDE CONTENT ===== */
.slide-header {
  max-width: 1100px;
  margin: 0 auto 40px auto;
  width: 100%;
}
.slide-eyebrow {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--amber);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 18px;
}
.slide-eyebrow .dot {
  width: 6px;
  height: 6px;
  background: var(--amber);
  border-radius: 50%;
}
.slide-eyebrow .act-name {
  color: var(--fg-muted);
  letter-spacing: 0.1em;
}
.slide-title {
  font-size: clamp(32px, 4vw, 56px);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.05;
  color: var(--fg);
  max-width: 1000px;
}

.slide-body {
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
  flex: 1;
}

.speech {
  position: relative;
  padding: 28px 32px 28px 48px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--amber);
  border-radius: var(--radius);
  margin: 32px 0;
  font-size: 19px;
  line-height: 1.6;
  color: var(--fg);
  font-style: italic;
  font-weight: 400;
}
.speech::before {
  content: '💬';
  position: absolute;
  left: -18px;
  top: 24px;
  width: 36px;
  height: 36px;
  background: var(--bg);
  border: 1px solid var(--border-strong);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-style: normal;
}

.prose { color: var(--fg); font-size: 17px; }
.prose p { margin: 16px 0; }
.prose h3 {
  font-size: 22px;
  font-weight: 700;
  color: var(--fg);
  margin: 32px 0 14px 0;
  font-family: var(--font-head);
}
.prose ul, .prose ol { margin: 16px 0; padding-left: 22px; }
.prose li { margin: 8px 0; color: var(--fg); }
.prose li::marker { color: var(--amber); }
.prose strong { color: var(--fg); font-weight: 700; }
.prose em { color: var(--fg-muted); }
.prose blockquote {
  border-left: 3px solid var(--border-strong);
  padding: 8px 0 8px 24px;
  margin: 20px 0;
  color: var(--fg-muted);
  font-style: italic;
}
.prose code {
  background: var(--code-bg);
  color: var(--amber-soft);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.9em;
  border: 1px solid var(--border);
}
.prose table {
  width: 100%;
  border-collapse: collapse;
  margin: 24px 0;
  font-size: 15px;
}
.prose th, .prose td {
  padding: 12px 16px;
  text-align: left;
  border: 1px solid var(--border);
}
.prose th {
  background: var(--surface-2);
  font-family: var(--font-head);
  font-weight: 700;
  color: var(--fg);
}
.prose td { color: var(--fg-muted); }

.callout {
  background: linear-gradient(135deg, rgba(245,158,11,0.08) 0%, rgba(245,158,11,0.02) 100%);
  border: 1px solid rgba(245,158,11,0.25);
  border-radius: var(--radius);
  padding: 24px 28px;
  margin: 28px 0;
  font-size: 17px;
  color: var(--fg);
}
.callout strong { color: var(--amber); }

/* ===== COMPONENTS ===== */

/* PROMPT BOX */
.promptbox {
  margin: 28px 0;
  background: var(--code-bg);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.promptbox-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid var(--border);
}
.promptbox-label {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--amber);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.promptbox-dots {
  display: flex;
  gap: 6px;
}
.promptbox-dots span {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--border-strong);
}
.promptbox-dots span:nth-child(1) { background: #ff5f56; }
.promptbox-dots span:nth-child(2) { background: #ffbd2e; }
.promptbox-dots span:nth-child(3) { background: #27c93f; }
.btn-copy {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--amber);
  color: #0a0a0a;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: all var(--transition);
}
.btn-copy:hover { background: var(--amber-soft); transform: translateY(-1px); }
.btn-copy.copied { background: #22c55e; color: white; }
.promptbox pre {
  margin: 0;
  padding: 22px 24px;
  color: #e5e5e5;
  font-size: 14px;
  line-height: 1.7;
  overflow-x: auto;
  white-space: pre-wrap;
  word-wrap: break-word;
}

/* IMAGE */
.image-wrap {
  margin: 28px 0;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--surface);
}
.image-wrap img {
  display: block;
  width: 100%;
  height: auto;
}
.image-caption {
  padding: 14px 20px;
  font-size: 13px;
  color: var(--fg-muted);
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  text-align: center;
  font-style: italic;
}

/* IMAGE PLACEHOLDER */
.placeholder {
  margin: 28px 0;
  min-height: 260px;
  border-radius: var(--radius);
  border: 2px dashed var(--border-strong);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 40px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(45deg, var(--border) 25%, transparent 25%),
    linear-gradient(-45deg, var(--border) 25%, transparent 25%);
  background-size: 16px 16px;
  opacity: 0.15;
}
.placeholder-icon {
  font-size: 32px;
  margin-bottom: 16px;
  opacity: 0.5;
  position: relative;
}
.placeholder-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 10px;
  position: relative;
}
.placeholder-text {
  color: var(--fg-muted);
  max-width: 600px;
  font-size: 15px;
  position: relative;
}

/* CAROUSEL */
.carousel {
  margin: 28px 0;
}
.carousel-scroll {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  padding-bottom: 16px;
  scroll-snap-type: x mandatory;
  scrollbar-width: thin;
}
.carousel-scroll::-webkit-scrollbar { height: 8px; }
.carousel-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
.carousel-item {
  flex: 0 0 280px;
  scroll-snap-align: start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: all var(--transition);
}
.carousel-item:hover {
  border-color: var(--amber);
  transform: translateY(-2px);
}
.carousel-item-num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 0.15em;
}
.carousel-item-title {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 700;
  color: var(--fg);
  margin: 16px 0 8px 0;
}
.carousel-item-desc {
  font-size: 13px;

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const state = {
  index: 0,
  total: SLIDES.length,
};

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function renderComponent(c, slideIdx, compIdx) {
  if (!c) return '';
  if (c.type === 'promptbox') {
    return `
      <div class="promptbox">
        <div class="promptbox-header">
          <div class="promptbox-label">
            <div class="promptbox-dots"><span></span><span></span><span></span></div>
            ${escapeHtml(c.label || 'Prompt')}
          </div>
          <button class="btn-copy" data-copy="${slideIdx}-${compIdx}">
            <span>📋</span> Copiar
          </button>
        </div>
        <pre id="code-${slideIdx}-${compIdx}">${escapeHtml(c.code)}</pre>
      </div>
    `;
  }
  if (c.type === 'image') {
    return `
      <div class="image-wrap">
        <img src="${c.src}" alt="${escapeHtml(c.caption || '')}" onerror="this.parentElement.classList.add('hidden')">
        ${c.caption ? `<div class="image-caption">${escapeHtml(c.caption)}</div>` : ''}
      </div>
    `;
  }
  if (c.type === 'image-suggested') {
    return `
      <div class="placeholder">
        <div class="placeholder-icon">${c.icon || '🖼️'}</div>
        <div class="placeholder-label">${escapeHtml(c.label || 'Imagem sugerida')}</div>
        <div class="placeholder-text">${escapeHtml(c.text)}</div>
      </div>
    `;
  }
  if (c.type === 'carousel') {
    const items = c.items.map(it => `
      <div class="carousel-item">
        <div>
          <div class="carousel-item-num">${escapeHtml(it.num || '')}</div>
          <div class="carousel-item-title">${escapeHtml(it.title)}</div>
        </div>
        <div class="carousel-item-desc">${escapeHtml(it.desc || '')}</div>
      </div>
    `).join('');
    return `
      <div class="carousel">
        ${c.label ? `<div class="placeholder-label" style="margin-bottom: 14px;">${escapeHtml(c.label)}</div>` : ''}
        <div class="carousel-scroll">${items}</div>
      </div>
    `;
  }
  if (c.type === 'video') {
    return `
      <div class="video-wrap">
        <video controls>
          <source src="${c.src}" type="video/mp4">
        </video>
      </div>
      ${c.label ? `<div class="image-caption" style="margin-top: -16px; border-radius: 0 0 var(--radius) var(--radius); border-top: none;">${escapeHtml(c.label)}</div>` : ''}
    `;
  }
  if (c.type === 'diagram') {
    const imgPath = `imagens/diagramas/${c.id}.png`;
    return `
      <div class="diagram">
        <div class="diagram-header">
          <div class="diagram-title-wrap">
            <span class="diagram-badge">${c.critical ? '⭐ Diagrama crítico' : '🎨 Diagrama'}</span>
            <span class="diagram-title">${escapeHtml(c.title)}</span>
          </div>
        </div>
        <div class="diagram-body">
          <img src="${imgPath}" alt="${escapeHtml(c.title)}"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
          <div class="diagram-placeholder-content" style="display:none;">
            <span class="icon">🎨</span>
            <div class="label">Diagrama pendente de geração</div>
            <div class="hint">Gere via AI Studio/Midjourney e salve como <code>${c.id}.png</code> em <code>imagens/diagramas/</code>.</div>
          </div>
        </div>
        <div class="diagram-toggle">
          <span class="placeholder-label" style="margin:0;">Prompt de geração</span>
          <button class="btn-ghost" data-toggle-prompt="${slideIdx}-${compIdx}">Ver prompt</button>
          <button class="btn-copy" data-copy-prompt="${slideIdx}-${compIdx}"><span>📋</span> Copiar</button>
        </div>
        <div class="diagram-prompt" id="prompt-${slideIdx}-${compIdx}">
          <pre id="promptcode-${slideIdx}-${compIdx}">${escapeHtml(c.prompt)}</pre>
        </div>
      </div>
    `;
  }
  if (c.type === 'callout') {
    return `<div class="callout">${c.text}</div>`;
  }
  return '';
}

function renderSlide(slide, idx) {
  if (slide.type === 'cover') {
    return `
      <section class="slide cover" data-idx="${idx}">
        <div class="cover-content">
          <div class="cover-poster">
            <img src="${ASSETS.capa}" alt="Ensinio Talks — Orquestrando Inteligência Artificial com Frameworks, com Luiz Fosc">
          </div>
          <div class="cover-text">
            <div class="cover-kicker">${escapeHtml(slide.kicker)}</div>
            <h1 class="cover-title">${escapeHtml(slide.title[0])} <span class="amber">${escapeHtml(slide.title[1])}</span></h1>
            <p class="cover-subtitle">${escapeHtml(slide.subtitle)}</p>
            <div class="cover-meta">
              ${slide.meta.map(m => `<div class="cover-meta-item">${escapeHtml(m.label)}<strong>${escapeHtml(m.value)}</strong></div>`).join('')}
            </div>
          </div>
        </div>
        <div class="cover-hint">Use as setas ← → para navegar</div>
      </section>
    `;
  }

  if (slide.type === 'divider') {
    return `
      <section class="slide divider" data-idx="${idx}" data-act="${slide.act}">
        <div class="divider-content">
          <div class="divider-label">Ato ${slide.act} de 8</div>
          <div class="divider-number">${String(slide.act).padStart(2, '0')}</div>
          <h2 class="divider-title">${escapeHtml(ACTS[slide.act])}</h2>
          <div class="divider-line"></div>
        </div>
      </section>
    `;
  }

  // Regular slide
  const components = (slide.components || [])
    .map((c, ci) => renderComponent(c, idx, ci))
    .join('');

  return `
    <section class="slide" data-idx="${idx}" data-act="${slide.act}">
      <div class="slide-header">
        <div class="slide-eyebrow">
          <span class="dot"></span>
          <span>Ato ${slide.act} · Slide ${slide.id}</span>
          <span class="act-name">— ${escapeHtml(ACTS[slide.act])}</span>
        </div>
        <h2 class="slide-title">${escapeHtml(slide.title)}</h2>
      </div>
      <div class="slide-body">
        ${slide.speech ? `<div class="speech">${escapeHtml(slide.speech)}</div>` : ''}
        ${slide.body ? `<div class="prose">${slide.body}</div>` : ''}
        ${components}
      </div>
    </section>
  `;
}

function renderAll() {
  const main = $('#main');
  main.innerHTML = SLIDES.map(renderSlide).join('');
  renderSidebar();
  attachHandlers();
  goTo(0, false);
}

function renderSidebar() {
  const nav = $('#sidebarNav');
  let html = '';
  let currentAct = null;

  SLIDES.forEach((slide, idx) => {
    if (slide.type === 'cover') {
      html += `<button class="sidebar-item" data-goto="${idx}"><span class="num">◆</span>Capa</button>`;
      return;
    }
    if (slide.type === 'divider') {
      currentAct = slide.act;
      html += `<div class="sidebar-act">Ato ${slide.act} · ${escapeHtml(ACTS[slide.act])}</div>`;
      html += `<button class="sidebar-item" data-goto="${idx}"><span class="num">—</span>Abertura do ato</button>`;
      return;
    }
    html += `<button class="sidebar-item" data-goto="${idx}"><span class="num">${slide.id}</span>${escapeHtml(slide.title)}</button>`;
  });

  nav.innerHTML = html;
}

function updateProgress() {
  const pct = ((state.index + 1) / state.total) * 100;
  $('#progressFill').style.width = pct + '%';
  $('#curNum').textContent = String(state.index + 1).padStart(2, '0');
  $('#totalNum').textContent = String(state.total).padStart(2, '0');
  $('#btnPrev').disabled = state.index === 0;
  $('#btnNext').disabled = state.index === state.total - 1;

  // Sidebar active state
  $$('.sidebar-item').forEach((el, i) => {
    el.classList.toggle('active', parseInt(el.dataset.goto, 10) === state.index);
  });
}

function goTo(idx, smooth = true) {
  idx = Math.max(0, Math.min(SLIDES.length - 1, idx));
  state.index = idx;
  const slide = $(`.slide[data-idx="${idx}"]`);
  if (slide) {
    slide.scrollIntoView({ behavior: smooth ? 'smooth' : 'instant', block: 'start' });
  }
  updateProgress();

  // close sidebar on mobile
  if (window.innerWidth <= 840) {
    $('#sidebar').classList.remove('open');
  }
}

function next() { goTo(state.index + 1); }
function prev() { goTo(state.index - 1); }

function toggleTheme() {
  const html = document.documentElement;
  const cur = html.getAttribute('data-theme');
  const nxt = cur === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', nxt);
  try { localStorage.setItem('theme', nxt); } catch (e) {}
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
  } catch (e) {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  if (btn) {
    const original = btn.innerHTML;
    btn.classList.add('copied');
    btn.innerHTML = '<span>✓</span> Copiado!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = original;
    }, 1800);
  }
}

function attachHandlers() {
  // Navigation buttons
  $('#btnPrev').onclick = prev;
  $('#btnNext').onclick = next;
  $('#btnTheme').onclick = toggleTheme;
  $('#btnFull').onclick = toggleFullscreen;

  // Sidebar items
  $$('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => {
      goTo(parseInt(el.dataset.goto, 10));
    });
  });

  // Menu toggle (mobile)
  $('#menuToggle').onclick = () => {
    $('#sidebar').classList.toggle('open');
  };

  // Delegate: copy buttons
  document.addEventListener('click', (e) => {
    const copyBtn = e.target.closest('[data-copy]');
    if (copyBtn) {
      const key = copyBtn.dataset.copy;
      const code = document.getElementById(`code-${key}`)?.textContent || '';
      copyToClipboard(code, copyBtn);
      return;
    }
    const copyPromptBtn = e.target.closest('[data-copy-prompt]');
    if (copyPromptBtn) {
      const key = copyPromptBtn.dataset.copyPrompt;
      const code = document.getElementById(`promptcode-${key}`)?.textContent || '';
      copyToClipboard(code, copyPromptBtn);
      return;
    }
    const toggleBtn = e.target.closest('[data-toggle-prompt]');
    if (toggleBtn) {
      const key = toggleBtn.dataset.togglePrompt;
      const box = document.getElementById(`prompt-${key}`);
      if (box) {
        box.classList.toggle('open');
        toggleBtn.textContent = box.classList.contains('open') ? 'Ocultar prompt' : 'Ver prompt';
      }
    }
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); next(); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
    else if (e.key === 'Home') { e.preventDefault(); goTo(0); }
    else if (e.key === 'End') { e.preventDefault(); goTo(SLIDES.length - 1); }
    else if (e.key === 't' || e.key === 'T') { toggleTheme(); }
    else if (e.key === 'f' || e.key === 'F') { toggleFullscreen(); }
    else if (e.key === 'Escape') { $('#sidebar').classList.remove('open'); }
  });

  // Track scroll position to update current slide
  const main = $('#main');
  let scrollTimeout;
  main.addEventListener('scroll', () => {
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      const slides = $$('.slide');
      const mainRect = main.getBoundingClientRect();
      let closest = 0;
      let minDist = Infinity;
      slides.forEach((s, i) => {
        const rect = s.getBoundingClientRect();
        const dist = Math.abs(rect.top - mainRect.top);
        if (dist < minDist) { minDist = dist; closest = i; }
      });
      if (closest !== state.index) {
        state.index = closest;
        updateProgress();
      }
    }, 100);
  });
}

function init() {
  // Restore theme
  try {
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  } catch (e) {}

  renderAll();
}

init();
</script>
</body>
</html>
