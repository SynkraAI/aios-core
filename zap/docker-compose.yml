version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - zap_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  evolution-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - zap_network

  evolution:
    image: atendai/evolution-api:homolog
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-changeme}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@evolution-db:5432/evolution?schema=public
      - DATABASE_URL=postgresql://postgres:postgres@evolution-db:5432/evolution?schema=public
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/6
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - LOG_LEVEL=ERROR,WARN,LOG
      - LOG_BAILEYS=error
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1033105955
      - QRCODE_LIMIT=10
      - QRCODE_EXPIRATION_TIME=60
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://api:3001/webhooks/evolution
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=true
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      redis:
        condition: service_healthy
      evolution-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zap_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zap_network

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    env_file:
      - .env
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    command: ["npx", "tsx", "watch", "apps/api/src/workers/index.ts"]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zap_network

volumes:
  redis_data:
  evolution_instances:
  evolution_db_data:

networks:
  zap_network:
    driver: bridge
