# AIOS Content Capability Map v1.0
# Registro de "quem faz o que de melhor" no ecossistema.
# Consultado pelo Content Forge para montar planos de producao.
#
# Estrutura por capability:
#   best: caminho do squad/skill principal
#   agent: agente especifico (se squad)
#   why: motivo da escolha
#   alternatives: opcoes alternativas com condicoes
#   requires: dependencias
#   cost: custo estimado (se aplicavel)
#   note: observacoes

version: 1
last_updated: "2026-04-06"

